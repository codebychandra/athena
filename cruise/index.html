<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Always revalidate the HTML so new app.js/style.css versions load without a manual hard-refresh -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Cruise Line — CTI Group</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23B01A18'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='9' font-family='serif' font-style='italic' font-weight='bold'>CL</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="../core/style.css?v=20260527H">
  <!-- Auth must load before app.js -->
  <script src="../core/auth.js?v=20260526K"></script>
</head>
<body>

  <!-- Auth guard -->
  <script>
    if (!CTIAuth.requireAuth()) { document.body.innerHTML = ''; }
  </script>

  <div class="app-shell">

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

      <!-- Logo / Brand -->
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-label">CTI Group</div>
          <div class="brand-name">Cruise Line Portal</div>
        </div>
        <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="Collapse sidebar">
          <svg class="collapse-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <!-- Athena Hub — plain link, not nav-link so router ignores it -->
        <a href="https://codebychandra.github.io/athena/index.html"
          class="hub-nav-link"
          style="display:flex;align-items:center;gap:10px;padding:9px 12px 9px 13px;
            font-size:12.5px;font-weight:500;color:#AAAAAA;text-decoration:none;
            border-left:3px solid transparent;
            border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:4px;
            padding-bottom:10px;opacity:0.6;white-space:nowrap;
            transition:opacity 0.15s,color 0.15s;"
          onmouseover="this.style.opacity='1';this.style.color='#fff'"
          onmouseout="this.style.opacity='0.6';this.style.color='#AAAAAA'"
          title="Athena Hub">
          <svg style="width:15px;height:15px;flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="nav-text">Athena Hub</span>
        </a>
        <!-- Requisition -->
        <a href="#" class="nav-link active" data-page="requisition" title="Requisition">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          <span class="nav-text">Requisition</span>
        </a>
        <!-- Candidate -->
        <a href="#" class="nav-link" data-page="candidate" title="Candidate">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span class="nav-text">Candidate</span>
        </a>
        <!-- Final Interview -->
        <a href="#" class="nav-link" data-page="finalinterview" title="Final Interview">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="nav-text">Final Interview</span>
        </a>
        <!-- Seafarer -->
        <a href="#" class="nav-link" data-page="seafarer" title="Seafarer">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>
          <span class="nav-text">Seafarer</span>
        </a>
        <!-- Attachment -->
        <a href="#" class="nav-link" data-page="seafarerAttachment" title="Attachment">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          <span class="nav-text">Attachment</span>
        </a>
        <!-- Visa -->
        <a href="#" class="nav-link" data-page="visa" title="Visa">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          <span class="nav-text">Visa</span>
        </a>
        <!-- Deployment -->
        <a href="#" class="nav-link" data-page="deployment" title="Deployment">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span class="nav-text">Deployment</span>
        </a>
        <!-- Report -->
        <a href="#" class="nav-link" data-page="reports" title="Report">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span class="nav-text">Report</span>
        </a>
        <!-- Task -->
        <a href="#" class="nav-link" data-page="task" title="Task">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span class="nav-text">Task</span>
        </a>
      </nav>

      <!-- Sidebar footer: user + logout -->
      <div class="sidebar-user-footer" id="sidebarUserFooter">
        <div class="sidebar-user-info">
          <a href="../index.html" class="sidebar-user-avatar" id="userAvatarSidebar"
            title="Back to Athena Hub"
            style="text-decoration:none;cursor:pointer;transition:opacity 0.15s;"
            onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">AD</a>
          <div class="sidebar-user-details">
            <div class="sidebar-user-name" id="usernameSidebar">Admin</div>
            <div class="sidebar-user-role" id="userRoleSidebar">Administrator</div>
          </div>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-breadcrumb">
            <a href="../index.html" class="breadcrumb-app"
              style="text-decoration:none;color:inherit;opacity:0.65;cursor:pointer;transition:opacity 0.15s;"
              onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.65'"
              title="Back to Athena Hub">Athena Hub</a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-app">Cruise Line</span>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-page" id="topbar-title">Requisition</span>
          </div>
        </div>
        <div class="topbar-right">
          <span class="topbar-date" id="topbar-date"></span>
          <span id="lastUpdatedBadge" style="font-size:11px;color:var(--text-muted,#888);display:flex;align-items:center;gap:4px;">
            🔄 <span id="lastUpdatedTime">Just now</span>
          </span>
          <span id="zohoBadge" style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.04em;transition:all 0.2s;">Server</span>
          <button id="refreshDataBtn" title="Refresh data"
            style="display:flex;align-items:center;justify-content:center;
              width:28px;height:28px;border-radius:50%;border:1px solid var(--border,#ddd);
              background:transparent;color:var(--text-muted,#888);cursor:pointer;
              font-family:inherit;transition:transform 0.4s,background 0.15s,color 0.15s;"
            onmouseover="this.style.background='var(--bg-hover,rgba(0,0,0,0.05))';this.style.color='var(--text,#1A1A1A)'"
            onmouseout="this.style.background='transparent';this.style.color='var(--text-muted,#888)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
          <button class="theme-toggle" id="theme-toggle">
            <span class="theme-toggle-light">Light</span>
            <span class="theme-toggle-dark">Dark</span>
          </button>
          <div class="user-chip" id="userChip">
            <div class="user-avatar" id="topbarAvatar" title="Signed in">AD</div>
            <span class="user-chip-name" id="topbarUsername">Admin</span>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="main-content" id="main-content">
        <div class="loading-state" id="loading-state">
          <div class="skeleton-block tall"></div>
          <div class="skeleton-row-group">
            <div class="skeleton-block"></div>
            <div class="skeleton-block"></div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="main-footer">
        © 2026 CTI Group Worldwide Services, Inc. · All rights reserved
      </footer>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js?v=20260529B"></script>
  <script>
    (function () {
      const s = CTIAuth.getSession();
      if (!s) return;
      const name = s.user.charAt(0).toUpperCase() + s.user.slice(1);
      const ini  = name.charAt(0).toUpperCase();
      const role = s.role === 'admin' ? 'Administrator' : 'Guest';

      document.getElementById('usernameSidebar').textContent   = name;
      document.getElementById('userRoleSidebar').textContent   = role;
      document.getElementById('userAvatarSidebar').textContent = ini;
      document.getElementById('topbarAvatar').textContent      = ini;
      document.getElementById('topbarAvatar').title            = `${name} (${role})`;
      document.getElementById('topbarUsername').textContent    = name;
    }());

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      CTIAuth.logout();
    });
  </script>
</body>
</html>
