<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Always revalidate the HTML so new app.js/style.css versions load without a manual hard-refresh -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AI Knowledge Library — CTI Group</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%231B3A6B'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='9' font-family='sans-serif' font-weight='bold'>KB</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../core/style.css?v=20260527H">
  <!-- Auth must load before app.js -->
  <script src="../core/auth.js?v=20260526K"></script>
</head>
<body>

  <!-- Auth guard -->
  <script>
    if (!CTIAuth.requireAuth()) { document.body.innerHTML = ''; }
  </script>

  <!-- Knowledge Library password gate -->
  <script>
    (function () {
      const KB_HASH = 'ef8e5b8012a7598cfa0f65069b44765ea6d3f10359b104c4e69504b93df5c40f';
      const KB_KEY  = 'cti_kb_auth';

      async function sha256(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      }

      function showGate() {
        const overlay = document.createElement('div');
        overlay.id = 'kbGate';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;';
        overlay.innerHTML = `
          <div style="background:#fff;border-radius:14px;padding:32px 30px 24px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,0.25);">
            <div style="font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:4px;">🔒 Knowledge Library</div>
            <div style="font-size:12px;color:#6B7280;margin-bottom:20px;">Enter password to access</div>
            <input id="kbPwInput" type="password" placeholder="Password"
              style="width:100%;height:38px;border:1px solid #E5E7EB;border-radius:8px;padding:0 12px;
                font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:6px;">
            <div id="kbPwErr" style="color:#DC2626;font-size:11px;min-height:16px;margin-bottom:12px;"></div>
            <div style="display:flex;gap:8px;justify-content:flex-end;">
              <a href="../index.html" style="padding:7px 16px;font-size:12px;font-weight:600;border:1px solid #E5E7EB;border-radius:7px;color:#6B7280;text-decoration:none;display:inline-flex;align-items:center;">Cancel</a>
              <button id="kbPwOk" style="padding:7px 20px;font-size:12px;font-weight:600;border:none;background:#1B3A6B;color:#fff;border-radius:7px;cursor:pointer;font-family:inherit;">Unlock</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);

        const inp  = overlay.querySelector('#kbPwInput');
        const errEl= overlay.querySelector('#kbPwErr');
        inp.focus();

        const tryUnlock = async () => {
          const hash = await sha256(inp.value);
          if (hash === KB_HASH) {
            sessionStorage.setItem(KB_KEY, '1');
            overlay.remove();
          } else {
            errEl.textContent = 'Incorrect password.';
            inp.value = '';
            inp.focus();
          }
        };

        overlay.querySelector('#kbPwOk').addEventListener('click', tryUnlock);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
        inp.addEventListener('input',   () => { errEl.textContent = ''; });
      }

      if (!sessionStorage.getItem(KB_KEY)) showGate();
    })();
  </script>

  <div class="app-shell" style="--sidebar-width:0px;">

    <!-- Main Wrapper (full-width, no sidebar) -->
    <div class="main-wrapper" style="margin-left:0;">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-breadcrumb" style="padding-left:16px;">
            <a href="../index.html" class="breadcrumb-app"
              style="text-decoration:none;color:inherit;opacity:0.65;cursor:pointer;transition:opacity 0.15s;"
              onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.65'"
              title="Back to Athena Hub">
              <span style="font-size:13px;font-weight:700;color:var(--text);">CTI Group</span>
            </a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-app" style="font-weight:600;">AI Knowledge Library</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle" id="theme-toggle">
            <span class="theme-toggle-light">Light</span>
            <span class="theme-toggle-dark">Dark</span>
          </button>
          <div class="user-chip" id="userChip">
            <div class="user-avatar" id="topbarAvatar" title="Signed in">AD</div>
            <span class="user-chip-name" id="topbarUsername">Admin</span>
          </div>
          <button id="logoutBtn" title="Sign out"
            style="display:flex;align-items:center;justify-content:center;
              padding:6px 12px;border-radius:8px;border:1px solid var(--border,#ddd);
              background:transparent;color:var(--text-muted,#888);cursor:pointer;
              font-size:12px;font-weight:600;font-family:inherit;transition:all 0.15s;"
            onmouseover="this.style.borderColor='#B01A18';this.style.color='#B01A18'"
            onmouseout="this.style.borderColor='var(--border,#ddd)';this.style.color='var(--text-muted,#888)'">
            Sign out
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <main class="main-content" id="main-content">
      </main>

      <!-- Footer -->
      <footer class="main-footer">
        © 2026 CTI Group Worldwide Services, Inc. · All rights reserved
      </footer>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js?v=20260603A"></script>
  <script>
    (function () {
      const s = CTIAuth.getSession();
      if (!s) return;
      const name = s.user.charAt(0).toUpperCase() + s.user.slice(1);
      const ini  = name.charAt(0).toUpperCase();
      document.getElementById('topbarAvatar').textContent   = ini;
      document.getElementById('topbarAvatar').title         = name;
      document.getElementById('topbarUsername').textContent = name;
    }());

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      CTIAuth.logout();
    });
  </script>
</body>
</html>
