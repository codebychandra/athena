<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Always revalidate the HTML so new app.js/style.css versions load without a manual hard-refresh -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AI Knowledge Library — CTI Group</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%231B3A6B'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='9' font-family='sans-serif' font-weight='bold'>KB</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../core/style.css?v=20260527H">
  <!-- Auth must load before app.js -->
  <script src="../core/auth.js?v=20260526K"></script>
</head>
<body>

  <!-- Auth guard -->
  <script>
    if (!CTIAuth.requireAuth()) { document.body.innerHTML = ''; }
  </script>

  <!-- Knowledge Library password gate — blocks ALL content until unlocked -->
  <script>
    (function () {
      const KB_HASH = 'ef8e5b8012a7598cfa0f65069b44765ea6d3f10359b104c4e69504b93df5c40f';
      const KB_KEY  = 'cti_kb_auth';

      // Already unlocked this session — reveal immediately
      if (sessionStorage.getItem(KB_KEY)) return;

      // Block the page body before anything renders
      document.documentElement.style.visibility = 'hidden';

      async function sha256(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      }

      function showGate() {
        // Full-page blocking gate (no overlay — IS the screen)
        document.documentElement.style.visibility = 'visible';
        document.body.style.cssText = 'margin:0;padding:0;background:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,system-ui,sans-serif;';
        document.body.innerHTML = `
          <div style="background:#1e293b;border-radius:16px;padding:40px 36px 32px;width:360px;
            box-shadow:0 24px 60px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
              <div style="width:38px;height:38px;border-radius:10px;background:#1B3A6B;display:flex;align-items:center;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </div>
              <div>
                <div style="font-size:16px;font-weight:700;color:#f1f5f9;">AI Knowledge Library</div>
                <div style="font-size:11px;color:#64748b;">CTI Group — Restricted Access</div>
              </div>
            </div>
            <div style="height:1px;background:rgba(255,255,255,0.07);margin:20px 0;"></div>
            <label style="font-size:12px;font-weight:600;color:#94a3b8;display:block;margin-bottom:7px;">Password</label>
            <input id="kbPwInput" type="password" placeholder="Enter password"
              style="width:100%;height:42px;border:1.5px solid rgba(255,255,255,0.12);border-radius:9px;
                padding:0 14px;font-size:13.5px;font-family:inherit;outline:none;box-sizing:border-box;
                background:rgba(255,255,255,0.05);color:#f1f5f9;transition:border-color 0.15s;">
            <div id="kbPwErr" style="color:#f87171;font-size:11px;min-height:18px;margin-top:6px;"></div>
            <div style="display:flex;gap:10px;margin-top:16px;">
              <a href="../index.html"
                style="flex:1;padding:10px;font-size:12.5px;font-weight:600;border:1.5px solid rgba(255,255,255,0.12);
                  border-radius:9px;color:#94a3b8;text-decoration:none;display:flex;align-items:center;justify-content:center;
                  transition:border-color 0.15s,color 0.15s;"
                onmouseover="this.style.borderColor='rgba(255,255,255,0.3)';this.style.color='#f1f5f9'"
                onmouseout="this.style.borderColor='rgba(255,255,255,0.12)';this.style.color='#94a3b8'">
                Cancel
              </a>
              <button id="kbPwOk"
                style="flex:2;padding:10px;font-size:12.5px;font-weight:700;border:none;
                  background:#1B3A6B;color:#fff;border-radius:9px;cursor:pointer;font-family:inherit;
                  transition:background 0.15s;"
                onmouseover="this.style.background='#254f96'"
                onmouseout="this.style.background='#1B3A6B'">
                Unlock
              </button>
            </div>
          </div>`;

        const inp   = document.getElementById('kbPwInput');
        const errEl = document.getElementById('kbPwErr');
        inp.focus();

        inp.addEventListener('focus',  () => inp.style.borderColor = '#3b82f6');
        inp.addEventListener('blur',   () => inp.style.borderColor = 'rgba(255,255,255,0.12)');
        inp.addEventListener('input',  () => { errEl.textContent = ''; });

        const tryUnlock = async () => {
          const btn = document.getElementById('kbPwOk');
          btn.textContent = '...'; btn.disabled = true;
          const hash = await sha256(inp.value);
          if (hash === KB_HASH) {
            sessionStorage.setItem(KB_KEY, '1');
            location.reload(); // reload now that session key is set
          } else {
            errEl.textContent = 'Incorrect password. Please try again.';
            inp.value = ''; inp.focus();
            btn.textContent = 'Unlock'; btn.disabled = false;
          }
        };

        document.getElementById('kbPwOk').addEventListener('click', tryUnlock);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
      }

      // Run after DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', showGate);
      } else {
        showGate();
      }
    })();
  </script>

  <div class="app-shell" style="--sidebar-width:0px;">

    <!-- Main Wrapper (full-width, no sidebar) -->
    <div class="main-wrapper" style="margin-left:0;">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-breadcrumb" style="padding-left:16px;">
            <a href="../index.html" class="breadcrumb-app"
              style="text-decoration:none;color:inherit;opacity:0.65;cursor:pointer;transition:opacity 0.15s;"
              onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.65'"
              title="Back to Athena Hub">
              <span style="font-size:13px;font-weight:700;color:var(--text);">CTI Group</span>
            </a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-app" style="font-weight:600;">AI Knowledge Library</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle" id="theme-toggle">
            <span class="theme-toggle-light">Light</span>
            <span class="theme-toggle-dark">Dark</span>
          </button>
          <div class="user-chip" id="userChip">
            <div class="user-avatar" id="topbarAvatar" title="Signed in">AD</div>
            <span class="user-chip-name" id="topbarUsername">Admin</span>
          </div>
          <button id="logoutBtn" title="Sign out"
            style="display:flex;align-items:center;justify-content:center;
              padding:6px 12px;border-radius:8px;border:1px solid var(--border,#ddd);
              background:transparent;color:var(--text-muted,#888);cursor:pointer;
              font-size:12px;font-weight:600;font-family:inherit;transition:all 0.15s;"
            onmouseover="this.style.borderColor='#B01A18';this.style.color='#B01A18'"
            onmouseout="this.style.borderColor='var(--border,#ddd)';this.style.color='var(--text-muted,#888)'">
            Sign out
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <main class="main-content" id="main-content">
      </main>

      <!-- Footer -->
      <footer class="main-footer">
        © 2026 CTI Group Worldwide Services, Inc. · All rights reserved
      </footer>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js?v=20260603F"></script>
  <script>
    (function () {
      const s = CTIAuth.getSession();
      if (!s) return;
      const name = s.user.charAt(0).toUpperCase() + s.user.slice(1);
      const ini  = name.charAt(0).toUpperCase();
      document.getElementById('topbarAvatar').textContent   = ini;
      document.getElementById('topbarAvatar').title         = name;
      document.getElementById('topbarUsername').textContent = name;
    }());

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      CTIAuth.logout();
    });
  </script>
</body>
</html>
